<!DOCTYPE html>
<html lang="fr">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>Exercice 3</title>
  </head>

  <body>
    <div class="container">
      <header>
        <h1>Annexe 3: Exercice 3 - Formulaire de contact</h1>
      </header>
      <hr>
      <main>
        <h2>Exercice 3: Formulaire de contact</h2>
        <form>
          <fieldset>
            <legend>Informations personnelles</legend>
            <div id="titles">
              <label for="mlle">Mlle<input type="radio" name="mlle" id="mlle"></label>
              <label for="mme">Mme<input type="radio" name="mme" id="mme"></label>
              <label for="mr">M.<input type="radio" name="mr" id="mr"></label>
            </div>
            <div id="sender-infos">
              <div><label for="firstname">Prénom <input type="text" placeholder="Votre prénom" id="firstname"
                    name="firstname"></label></div>
              <div><label for="lastname">Nom* <input type="text" placeholder="Votre nom" id="lastname"
                    name="lastname"></label>
              </div>
              <div><label for="email">Email* <input type="email" placeholder="Votre adresse email" id="email"
                    name="email"></label>
              </div>
            </div>
          </fieldset>
          <fieldset id="msg-field">
            <legend>Votre message</legend>
            <div>
              <label for="receiver">Destinataire</label>
              <select name="receiver" id="receiver">
                <option value="general">Général</option>
                <option value="marketing">Marketing</option>
                <option value="product">Product</option>
              </select>
            </div>
            <div>
              <label for="subject">Sujet* <input type="text" placeholder="L'objet de votre message" id="subject"
                  name="subject"></label>
            </div>
            <div>
              <label for="message">Message* <textarea name="message" id="message" rows="10"
                  cols="100"></textarea></label>
            </div>
            <div>
              <label for="attachment">Ajouter une pièce jointe <input type="file" name="attachment"
                  id="attachment"></label>
            </div>
          </fieldset>
          <fieldset>
            <legend>Options</legend>
            <label for="msg-copy"><input type="checkbox" name="msg-copy" id="msg-copy"> Recevoir une copie du
              message</label>
            <br>
            <label for="offers"><input type="checkbox" name="offers" id="offers"> Recevoir nos offres</label>
            <hr>
            <p>Etre contacté par un conseiller</p> <label for="no-contact"><input type="radio" name="no-contact"
                id="no-contact"> Non</label>
            <label for="phone-only"><input type="radio" name="phone-only" id="phone-only"> Par téléphone</label>
            <label for="email-only"><input type="radio" name="email-only" id="email-only"> Par email</label>
          </fieldset>
          <small>*: champs obligatoires</small>
          <div>
            <button>Valider</button>
            <button>Effacer</button>
          </div>
          <hr>
        </form>
      </main>

      <footer>
        <a href="../index.html">Retour à la page d'accueil</a>
      </footer>
    </div>
  </body>

</html>
