<!DOCTYPE html>
<html lang="fr">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>Exercice 3</title>
  </head>

  <body>
    <div class="container">
      <header>
        <h1>Annexe 3: Exercice 3 - Formulaire de contact</h1>
      </header>
      <hr>
      <main>
        <h2>Exercice 3: Formulaire de contact</h2>
        <form>
          <fieldset>
            <legend>Informations personnelles</legend>
            <div id="titles">
              <label for="mlle">Mlle<input type="radio" name="title" id="mlle" value="mlle" checked></label>
              <label for="mme">Mme<input type="radio" name="title" id="mme" value="mme"></label>
              <label for="mr">M.<input type="radio" name="title" id="mr" value="mr"></label>
            </div>
            <div id="sender-infos">
              <div><label for="firstname">Prénom <input type="text" placeholder="Votre prénom" id="firstname"
                    name="firstname"></label></div>
              <div><label for="lastname">Nom* <input type="text" placeholder="Votre nom" id="lastname" name="lastname"
                    required></label>
              </div>
              <div><label for="email">Email* <input type="email" placeholder="Votre adresse email" id="email"
                    name="email" required></label>
              </div>
            </div>
          </fieldset>
          <fieldset id="msg-field">
            <legend>Votre message</legend>
            <div>
              <label for="receiver">Destinataire</label>
              <select name="receiver" id="receiver">
                <option value="general">Général</option>
                <option value="marketing">Marketing</option>
                <option value="product">Product</option>
              </select>
            </div>
            <div>
              <label for="subject">Sujet* <input type="text" placeholder="L'objet de votre message" id="subject"
                  name="subject" required></label>
            </div>
            <div>
              <label for="message">Message* <textarea name="message" id="message" rows="10" cols="100" required
                  placeholder="  Saisissez votre message ici"></textarea></label>
            </div>
            <div>
              <label for="attachment">Ajouter une pièce jointe <input type="file" name="attachment"
                  id="attachment"></label>
            </div>
          </fieldset>
          <fieldset id="option-field">
            <legend>Options</legend>
            <label for="msg-copy"><input type="checkbox" name="copy-data" id="msg-copy" value="msg-copy"> Recevoir une
              copie du
              message</label>
            <br>
            <label for="offers"><input type="checkbox" name="copy-data" id="offers" value="offers"> Recevoir nos
              offres</label>
            <hr>
            <p>Etre contacté par un conseiller</p>
            <div>
              <label for="no-contact"><input type="radio" name="contact" id="no-contact" value="no-contact"> Non</label>
              <label for="phone-only"><input type="radio" name="contact" id="phone-only" value="phone-only"> Par
                téléphone</label>
              <label for="email-only"><input type="radio" name="contact" id="email-only" value="email-only" checked> Par
                email</label>
            </div>
          </fieldset>
          <div id="form-footer">
            <small>*: champs obligatoires</small>
            <div id="form-btns">
              <button type="submit">Valider</button>
              <button type="reset">Effacer</button>
            </div>
          </div>
        </form>
      </main>
      <hr>
      <footer>
        <a href="../index.html" target="_blank">Retour à la page d'accueil</a>
      </footer>
    </div>
  </body>

</html>
